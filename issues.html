<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link rel="icon" href="assets/github-logo.png" type="image/x-icon" />

    <!-- Tailwind + DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- CSS -->
    <!-- <link rel="stylesheet" href="style/style.css" /> -->
  </head>

  <body class="min-h-screen max-w-8xl mx-auto bg-base-100">
    <div class="navbar bg-base-100 shadow-sm">
      <div class="flex-1 flex items-center">
        <img
          src="assets/github-logo.png"
          alt="GitHub Logo"
          class="w-8 h-8 mr-2"
        />
        <a class="text-xl">GitHub Issues Tracker</a>
      </div>

      <div class="flex gap-2">
        <input
          id="search-input"
          type="text"
          placeholder="Search"
          class="input input-bordered w-24 md:w-auto"
        />
        <button id="search-btn" class="btn btn-primary">Search</button>
      </div>
    </div>

    <div class="w-10/12 mx-auto flex flex-col min-h-[80vh]">
      <section class="pt-10 flex gap-2">
        <button class="btn btn-soft btn-primary btn-active" id="btn-all">
          All
        </button>
        <button class="btn btn-soft btn-primary" id="btn-open">Open</button>
        <button class="btn btn-soft btn-primary" id="btn-closed">Closed</button>
      </section>
      <section
        class="flex gap-2 mt-10 items-center p-4 rounded-lg border border-white-300"
      >
        <div
          class="bg-[#ECE4FF] rounded-full w-15 h-15 flex items-center justify-center"
        >
          <img class="w-10 h-10" src="assets/Aperture.png" alt="" />
        </div>
        <div class="flex flex-col">
          <p class="text-2xl font-bold"><span id="count">50</span> Issues</p>
          <p class="text-sm opacity-70">Track and manage your project issues</p>
        </div>
        <div class="flex gap-4 ml-auto items-center">
          <div class="flex items-center gap-1">
            <div class="bg-violet-500 h-2 w-2 rounded-full"></div>
            <span>Open</span>
          </div>
          <div class="flex items-center gap-1">
            <div class="bg-green-500 h-2 w-2 rounded-full"></div>
            <span>Closed</span>
          </div>
        </div>
      </section>

      <div
        id="spinner"
        class="flex-1 flex justify-center items-center"
        style="display: none"
      >
        <span class="loading loading-bars loading-xl"></span>
      </div>

      <section id="issue-card" class="grid grid-cols-3 gap-4 mt-8">
